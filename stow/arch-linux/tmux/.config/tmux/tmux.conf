set -g default-terminal "tmux-256color"
# set -g default-command "zsh" # only on zsh
set -g default-command "bash" # only on bash
set -g focus-events on
set -g set-clipboard on
set -g extended-keys on
set -g extended-keys-format csi-u

set -g prefix C-b

unbind r
bind r source-file ~/.config/tmux/tmux.conf
bind s choose-tree -sZ -O name

bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Right resize-pane -R 5
bind -r Left resize-pane -L 5

bind-key f run-shell "tmux neww ~/.local/bin/tm"

# Navigation between panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r m resize-pane -Z

set -g @agent-spinner-panes '#{P:#{?#{==:#(~/.config/tmux/scripts/tmux-agent-status check #{socket_path} #{pane_id}),1}, #{@agent-spinner-frame},}}'
run-shell -b '~/.config/tmux/scripts/tmux-agent-status tick #{socket_path}'

bind s run-shell ~/.config/tmux/scripts/update-branches.sh \; choose-tree -sZ -O name -F '#{?pane_format,#{pane_current_command} "#{pane_title}",#{?window_format,#{window_name}#{window_flags} (#{window_panes} panes)#{E:@agent-spinner-panes},#{?@branch,[#{@branch}] ,}#{session_windows} windows#{?session_attached, (attached),}#{W:#{E:@agent-spinner-panes}}}}'

bind g split-window -h \; split-window -v \; select-pane -L \; split-window -v \; select-pane -t 1

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

bind v copy-mode

unbind -T copy-mode-vi MouseDragEnd1Pane

set -sg escape-time 10

set -g @plugin 'tmux-plugins/tpm' # Clone first! git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @themepack 'powerline/default/gray'
set -g @themepack-window-status-format '#I:#W#F#{E:@agent-spinner-panes}'
set -g @themepack-window-status-current-format '#I:#W#F#{E:@agent-spinner-panes}'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '0'

# Start window numbering from 1
set -g base-index 1

# Start pane numbering from 1
setw -g pane-base-index 1
set -g renumber-windows on

run '~/.tmux/plugins/tpm/tpm' # prefix+I to refresh
